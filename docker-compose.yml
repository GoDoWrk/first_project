services:
  dashboard:
    build: .
    container_name: homelab-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_HOST=${APP_HOST:-0.0.0.0}
      - APP_PORT=${APP_PORT:-8000}
      - DATABASE_PATH=${DATABASE_PATH:-/data/dashboard.db}
      - APP_NAME=${APP_NAME:-Homelab Dashboard}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ${DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.getenv('APP_PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
